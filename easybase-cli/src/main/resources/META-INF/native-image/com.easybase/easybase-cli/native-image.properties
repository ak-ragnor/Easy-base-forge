# GraalVM native-image configuration for the EasyBase CLI.
#
# picocli-codegen generates its own reflect-config.json (in picocli-generated/)
# during compilation; this file supplements it with Jackson YAML config binding.
Args = -H:ReflectionConfigurationResources=${.}/reflect-config.json \
       -H:ResourceConfigurationResources=${.}/resource-config.json
