openapi: 3.0.3
info:
  title: Petstore API
  version: 1.0.0

tags:
  - name: pets
    description: Pet operations
  - name: orders
    description: Order operations

paths:

  /pets:
    get:
      tags: [pets]
      operationId: listPets
      summary: List all pets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: size
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PetDTO'

    post:
      tags: [pets]
      operationId: createPet
      summary: Create a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetDTO'

  /pets/{id}:
    get:
      tags: [pets]
      operationId: getPetById
      summary: Get a pet by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetDTO'
        '404':
          description: Not found

    put:
      tags: [pets]
      operationId: updatePet
      summary: Update a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePetRequest'
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetDTO'

    delete:
      tags: [pets]
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No content

  /orders:
    post:
      tags: [orders]
      operationId: createOrder
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'

  /orders/{id}:
    get:
      tags: [orders]
      operationId: getOrderById
      summary: Get an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'

components:
  schemas:

    PetDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    CreatePetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        status:
          type: string

    UpdatePetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        status:
          type: string

    OrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        petId:
          type: string
          format: uuid
        quantity:
          type: integer
        orderDate:
          type: string
          format: date

    CreateOrderRequest:
      type: object
      required: [petId, quantity]
      properties:
        petId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          maximum: 100
